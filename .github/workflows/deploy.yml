name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download customer logos
        run: |
          mkdir -p public/logos
          curl -sL "https://upload.wikimedia.org/wikipedia/commons/9/98/SWM.svg" -o public/logos/swm.svg
          curl -sL "https://upload.wikimedia.org/wikipedia/commons/3/31/MVG.svg" -o public/logos/mvg.svg
          curl -sL "https://upload.wikimedia.org/wikipedia/commons/4/43/Tollcollect-logo.svg" -o public/logos/toll-collect.svg
          curl -sL "https://upload.wikimedia.org/wikipedia/commons/c/c2/RWE_Logo_2020.svg" -o public/logos/rwe.svg

      - name: Build
        run: npm run build

      - name: Create Pages project (if not exists)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create vencly --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=vencly --commit-dirty=true
